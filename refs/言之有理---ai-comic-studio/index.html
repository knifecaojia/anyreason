
<!DOCTYPE html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>言之有理 | AI漫剧创作平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://esm.sh/@xyflow/react@12.0.0/dist/style.css" />
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Noto Sans SC"', 'sans-serif'],
            },
            colors: {
              background: 'var(--color-background)',
              surface: 'var(--color-surface)',
              surfaceHighlight: 'var(--color-surface-highlight)',
              primary: 'var(--color-primary)',
              accent: 'var(--color-accent)',
              textMain: 'var(--color-text-main)',
              textMuted: 'var(--color-text-muted)',
              border: 'var(--color-border)',
            },
            borderColor: {
              DEFAULT: 'var(--color-border)',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        /* Light Mode Defaults */
        --color-background: #F8FAFC;
        --color-surface: #FFFFFF;
        --color-surface-highlight: #F1F5F9;
        --color-primary: #3B82F6;
        --color-accent: #06B6D4;
        --color-text-main: #0F172A;
        --color-text-muted: #64748B;
        --color-border: #E2E8F0;
      }

      .dark {
        /* Dark Mode Overrides */
        --color-background: #0B0C10;
        --color-surface: #12141C;
        --color-surface-highlight: #1F222E;
        --color-primary: #3B82F6;
        --color-accent: #06B6D4;
        --color-text-main: #E2E8F0;
        --color-text-muted: #94A3B8;
        /* Darkened border color to prevent bright borders in dark theme */
        --color-border: #262626; 
      }

      body {
        background-color: var(--color-background);
        color: var(--color-text-main);
        overflow: hidden; /* App handles scrolling */
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--color-surface);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--color-border);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--color-text-muted);
      }
      .grid-bg {
        background-size: 40px 40px;
        background-image:
          linear-gradient(to right, rgba(128, 128, 128, 0.05) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(128, 128, 128, 0.05) 1px, transparent 1px);
      }
      /* React Flow Dark Mode Overrides */
      .react-flow__node {
        /* Removed default styling to use custom Tailwind classes */
        background: transparent;
        border: none;
      }
      .react-flow__handle {
        width: 10px;
        height: 10px;
        border: 2px solid var(--color-surface-highlight);
      }
      .react-flow__edge-path {
        stroke: var(--color-text-muted);
        stroke-width: 2;
      }
      .react-flow__controls button {
        background: var(--color-surface-highlight);
        border-bottom: 1px solid var(--color-border);
        fill: var(--color-text-main);
      }
      .react-flow__controls {
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }
      /* Markdown Styles */
      .markdown-body {
        color: var(--color-text-main);
      }
      .markdown-body h1, .markdown-body h2, .markdown-body h3 {
        font-weight: 700;
        margin-top: 1.5em;
        margin-bottom: 0.5em;
        color: var(--color-text-main);
      }
      .markdown-body h1 { font-size: 1.5em; border-bottom: 1px solid var(--color-border); padding-bottom: 0.3em; }
      .markdown-body h2 { font-size: 1.3em; }
      .markdown-body h3 { font-size: 1.1em; }
      .markdown-body p { margin-bottom: 1em; line-height: 1.6; }
      .markdown-body strong { color: var(--color-accent); }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "@xyflow/react": "https://esm.sh/@xyflow/react@12.0.0",
    "@xyflow/react/": "https://esm.sh/@xyflow/react@^12.10.0/",
    "react-markdown": "https://esm.sh/react-markdown@9.0.1",
    "remark-gfm": "https://esm.sh/remark-gfm@4.0.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
