# Anyreason AI Studio - ai.znxview.com
# 此配置文件应放置在 Nginx 容器的配置目录中

server {
    listen 80;
    server_name ai.znxview.com;
    
    # 强制 HTTPS 重定向
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ai.znxview.com;

    # Docker DNS resolver
    resolver 127.0.0.11 valid=30s;

    # SSL 证书配置 (使用 Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/ai.znxview.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.znxview.com/privkey.pem;
    
    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # 客户端请求大小限制
    client_max_body_size 100M;

    # API 请求转发到后端
    location /api/ {
        set $backend_upstream "http://backend:8000";
        proxy_pass $backend_upstream/api/;
        
        proxy_http_version 1.1;
        
        # 请求头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # WebSocket 端点 (用于任务状态推送)
    location /api/v1/tasks/ws {
        set $backend_ws_upstream "http://backend:8000";
        proxy_pass $backend_ws_upstream/api/v1/tasks/ws;
        
        proxy_http_version 1.1;
        
        # WebSocket 必需头
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    # OpenAPI 文档 (可选，生产环境可禁用)
    location /docs {
        set $backend_upstream "http://backend:8000";
        proxy_pass $backend_upstream/docs;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        set $backend_upstream "http://backend:8000";
        proxy_pass $backend_upstream/openapi.json;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # MinIO 静态资源 (如果需要直接访问)
    location /assets/ {
        set $minio_upstream "http://minio:9000";
        proxy_pass $minio_upstream/;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        # 缓存静态资源
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 前端应用 - 所有其他请求
    location / {
        set $frontend_upstream "http://frontend:3000";
        proxy_pass $frontend_upstream;
        
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Next.js HMR 支持 (生产环境可移除)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Next.js 静态资源
    location /_next/static {
        set $frontend_upstream "http://frontend:3000";
        proxy_pass $frontend_upstream;
        
        # 长期缓存
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
