# Anyreason AI Studio - ai.znxview.com (临时配置，用于申请 SSL 证书)

upstream anyreason_backend {
    server anyreason-prod-backend:8000;
    keepalive 32;
}

upstream anyreason_frontend {
    server anyreason-prod-frontend:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name ai.znxview.com;

    # Let's Encrypt 验证路径 (挂载到 /var/www/html)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # API 请求转发到后端
    location /api/ {
        proxy_pass http://anyreason_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # 前端应用
    location / {
        proxy_pass http://anyreason_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Next.js 静态资源
    location /_next/static/ {
        proxy_pass http://anyreason_frontend/_next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
