services:
  postgres:
    image: postgres:16-alpine
    container_name: anyreason-postgres
    restart: unless-stopped
    env_file:
      - ${ANYREASON_ENV_FILE:-.env}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anyreason}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      APP_DB_USER: ${APP_DB_USER:-anyreason_app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-anyreason_app}
      LITELLM_DB_NAME: ${LITELLM_DB_NAME:-litellm}
      LITELLM_DB_USER: ${LITELLM_DB_USER:-litellm}
      LITELLM_DB_PASSWORD: ${LITELLM_DB_PASSWORD:-litellm123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: anyreason-minio
    restart: unless-stopped
    env_file:
      - ${ANYREASON_ENV_FILE:-.env}
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: anyreason-minio-init
    depends_on:
      - minio
    restart: "no"
    env_file:
      - ${ANYREASON_ENV_FILE:-.env}
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET_ASSETS: ${MINIO_BUCKET_ASSETS:-anyreason-assets}
      MINIO_BUCKET_EXPORTS: ${MINIO_BUCKET_EXPORTS:-anyreason-exports}
      MINIO_BUCKET_SCRIPTS: ${MINIO_BUCKET_SCRIPTS:-anyreason-scripts}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./minio/init/create-buckets.sh:/create-buckets.sh:ro
    entrypoint: ["/bin/sh", "/create-buckets.sh"]

  redis:
    image: redis:7-alpine
    container_name: anyreason-redis
    restart: unless-stopped
    profiles:
      - queue
    env_file:
      - ${ANYREASON_ENV_FILE:-.env}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-redis}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10

  litellm-db-init:
    image: postgres:16-alpine
    container_name: litellm-db-init
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    env_file:
      - ${ANYREASON_ENV_FILE:-.env}
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      LITELLM_DB_NAME: ${LITELLM_DB_NAME:-litellm}
      LITELLM_DB_USER: ${LITELLM_DB_USER:-litellm}
      LITELLM_DB_PASSWORD: ${LITELLM_DB_PASSWORD:-litellm123}
    command:
      - /bin/sh
      - -lc
      - |
        psql -h postgres -U "$$POSTGRES_USER" -d postgres -v ON_ERROR_STOP=1 -v litellm_db="$$LITELLM_DB_NAME" -v litellm_user="$$LITELLM_DB_USER" -v litellm_password="$$LITELLM_DB_PASSWORD" <<'SQL'
        SELECT format('CREATE ROLE %I LOGIN PASSWORD %L', :'litellm_user', :'litellm_password')
        WHERE NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = :'litellm_user');
        \gexec

        SELECT format('CREATE DATABASE %I OWNER %I', :'litellm_db', :'litellm_user')
        WHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = :'litellm_db');
        \gexec
        SQL

        psql -h postgres -U "$$POSTGRES_USER" -d "$$LITELLM_DB_NAME" -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"

  litellm-proxy:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-proxy
    depends_on:
      postgres:
        condition: service_healthy
      litellm-db-init:
        condition: service_completed_successfully
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    env_file:
      - ${ANYREASON_ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql://${LITELLM_DB_USER:-litellm}:${LITELLM_DB_PASSWORD:-litellm123}@postgres:5432/${LITELLM_DB_NAME:-litellm}
      STORE_MODEL_IN_DB: "True"
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-change-me}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-change-me}
      UI_USERNAME: ${LITELLM_UI_USERNAME:-admin}
      UI_PASSWORD: ${LITELLM_UI_PASSWORD:-change-me}
      PROXY_ADMIN_ID: ${LITELLM_ADMIN_USER_ID:-admin}s
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 4000), 2); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3

  litellm-admin-init:
    image: curlimages/curl:8.6.0
    container_name: litellm-admin-init
    depends_on:
      litellm-proxy:
        condition: service_healthy
    restart: "no"
    env_file:
      - ${ANYREASON_ENV_FILE:-.env}
    entrypoint: ["/bin/sh", "-lc"]
    command: |
      i=1
      while [ "$$i" -le 30 ]; do
        code="$$(curl -sS -o /tmp/out.json -w '%{http_code}' \
          -H "Authorization: Bearer $$LITELLM_MASTER_KEY" \
          -H "Content-Type: application/json" \
          -X POST "http://litellm-proxy:4000/user/new" \
          --data "{\"user_email\":\"$$LITELLM_ADMIN_EMAIL\",\"user_id\":\"$$LITELLM_ADMIN_USER_ID\"}" || true)"
        if [ "$$code" = "200" ] || [ "$$code" = "201" ] || [ "$$code" = "409" ]; then
          cat /tmp/out.json || true
          exit 0
        fi
        sleep 1
        i="$$(($$i + 1))"
      done
      cat /tmp/out.json || true
      exit 1

volumes:
  pg_data:
  minio_data:
  redis_data:
