name: anyreason  # 添加这一行
services:
  postgres:
    image: postgres:16-alpine
    container_name: anyreason-postgres
    restart: unless-stopped
    env_file:
      - ${ANYREASON_ENV_FILE:-.env}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anyreason}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      APP_DB_USER: ${APP_DB_USER:-anyreason_app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-anyreason_app}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: anyreason-minio
    restart: unless-stopped
    env_file:
      - ${ANYREASON_ENV_FILE:-.env}
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: anyreason-minio-init
    depends_on:
      - minio
    restart: "no"
    env_file:
      - ${ANYREASON_ENV_FILE:-.env}
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET_ASSETS: ${MINIO_BUCKET_ASSETS:-anyreason-assets}
      MINIO_BUCKET_EXPORTS: ${MINIO_BUCKET_EXPORTS:-anyreason-exports}
      MINIO_BUCKET_SCRIPTS: ${MINIO_BUCKET_SCRIPTS:-anyreason-scripts}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./minio/init/create-buckets.sh:/create-buckets.sh:ro
    entrypoint: ["/bin/sh", "/create-buckets.sh"]

  redis:
    image: redis:7-alpine
    container_name: anyreason-redis
    restart: unless-stopped
    env_file:
      - ${ANYREASON_ENV_FILE:-.env}
    command: ["/bin/sh", "-lc", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD:-redis}\""]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD:-redis}\" ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  pg_data:
  minio_data:
  redis_data:
