version: '3.8'

services:
  # --- Support Services ---
  postgres:
    image: postgres:16-alpine
    container_name: anyreason-prod-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anyreason}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST_AUTH_METHOD: trust
      APP_DB_USER: ${APP_DB_USER:-anyreason_app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-anyreason_app}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: anyreason-prod-minio
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: anyreason-prod-minio-init
    depends_on:
      - minio
    restart: "no"
    env_file:
      - .env
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET_ASSETS: ${MINIO_BUCKET_ASSETS:-anyreason-assets}
      MINIO_BUCKET_EXPORTS: ${MINIO_BUCKET_EXPORTS:-anyreason-exports}
      MINIO_BUCKET_SCRIPTS: ${MINIO_BUCKET_SCRIPTS:-anyreason-scripts}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./minio/init/create-buckets.sh:/create-buckets.sh:ro
    entrypoint: ["/bin/sh", "/create-buckets.sh"]

  redis:
    image: redis:7-alpine
    container_name: anyreason-prod-redis
    restart: unless-stopped
    env_file:
      - .env
    command: ["/bin/sh", "-lc", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD:-redis}\""]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD:-redis}\" ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # --- Application Services ---
  db-init:
    image: anyreason-backend
    container_name: anyreason-prod-db-init
    restart: "no"
    working_dir: /app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-anyreason}
      ACCESS_SECRET_KEY: ${ACCESS_SECRET_KEY:-dev-access-secret-change-me}
      RESET_PASSWORD_SECRET_KEY: ${RESET_PASSWORD_SECRET_KEY:-dev-reset-password-secret-change-me}
      VERIFICATION_SECRET_KEY: ${VERIFICATION_SECRET_KEY:-dev-verification-secret-change-me}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER:-minioadmin}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-minioadmin}}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_BUCKET_SCRIPTS: ${MINIO_BUCKET_SCRIPTS:-anyreason-scripts}
    volumes:
      - ../fastapi_backend:/app
      - fastapi-venv:/app/.venv
      - ./db_init.py:/app/db_init.py:ro
    command: ["bash", "./start_db_init.sh"]
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ../fastapi_backend
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-bookworm}
    image: anyreason-backend
    container_name: anyreason-prod-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-anyreason}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      AUTO_DB_INIT_ON_STARTUP: "false"
      AUTO_DB_SEED_ON_STARTUP: "false"
      ACCESS_SECRET_KEY: ${ACCESS_SECRET_KEY:-dev-access-secret-change-me}
      RESET_PASSWORD_SECRET_KEY: ${RESET_PASSWORD_SECRET_KEY:-dev-reset-password-secret-change-me}
      VERIFICATION_SECRET_KEY: ${VERIFICATION_SECRET_KEY:-dev-verification-secret-change-me}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      OPENAPI_OUTPUT_FILE: /app/shared-data/openapi.json
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER:-minioadmin}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-minioadmin}}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_BUCKET_SCRIPTS: ${MINIO_BUCKET_SCRIPTS:-anyreason-scripts}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ../fastapi_backend:/app
      - fastapi-venv:/app/.venv
      - ../local-shared-data:/app/shared-data
    command: ["bash", "./start.sh"]
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  task-worker:
    image: anyreason-backend
    restart: unless-stopped
    deploy:
      replicas: ${WORKER_REPLICAS:-3}
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-anyreason}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      AUTO_DB_INIT_ON_STARTUP: "false"
      AUTO_DB_SEED_ON_STARTUP: "false"
      ACCESS_SECRET_KEY: ${ACCESS_SECRET_KEY:-dev-access-secret-change-me}
      RESET_PASSWORD_SECRET_KEY: ${RESET_PASSWORD_SECRET_KEY:-dev-reset-password-secret-change-me}
      VERIFICATION_SECRET_KEY: ${VERIFICATION_SECRET_KEY:-dev-verification-secret-change-me}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER:-minioadmin}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-minioadmin}}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_BUCKET_SCRIPTS: ${MINIO_BUCKET_SCRIPTS:-anyreason-scripts}
    volumes:
      - ../fastapi_backend:/app
      - fastapi-venv:/app/.venv
    command: ["bash", "./start_worker.sh"]
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../nextjs-frontend
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:20-bookworm}
    image: anyreason-frontend
    container_name: anyreason-prod-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      INTERNAL_API_BASE_URL: http://backend:8000
      API_BASE_URL: http://backend:8000
      OPENAPI_OUTPUT_FILE: ./shared-data/openapi.json
      NEXT_PUBLIC_USE_MOCK_API: "false"
      USE_MOCK_API: "false"
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: NIdHgpn4T2e_-VH6s5Xy6hE5aJi0s2o_TBTMiRr6TrQ
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    command: ["bash", "/app/start.sh"]
    volumes:
      - ../nextjs-frontend:/app
      - nextjs-node-modules:/app/node_modules
      - nextjs-next-cache:/app/.next
      - ../local-shared-data:/app/shared-data
    depends_on:
      backend:
        condition: service_started

  frontend-watcher:
    image: anyreason-frontend
    container_name: anyreason-prod-watch
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OPENAPI_OUTPUT_FILE: ./shared-data/openapi.json
    volumes:
      - ../nextjs-frontend:/app
      - nextjs-node-modules:/app/node_modules
      - ../local-shared-data:/app/shared-data
    command: ["node", "watcher.js"]
    depends_on:
      backend:
        condition: service_started

  nginx:
    image: nginx:alpine
    container_name: anyreason-prod-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/anyreason.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot
    depends_on:
      - backend
      - frontend
      - minio

volumes:
  pg_data:
  minio_data:
  redis_data:
  nextjs-node-modules:
  nextjs-next-cache:
  fastapi-venv:
