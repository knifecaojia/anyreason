# ===================================================================
# AnyReason AI Studio - HTTPS 配置（Cloudflare Origin Certificate）
# Cloudflare Full (Strict) 模式：CDN → HTTPS → nginx → 后端服务
# ===================================================================

# 提取 Cookie 中的 accessToken 转为 Bearer Token
map $http_cookie $cookie_auth_header {
    default "";
    "~*accessToken=([^;]+)" "Bearer $1";
}

# 决定最终的 Authorization 头：优先使用客户端自带的，否则使用 Cookie 转换的
map $http_authorization $final_auth_header {
    default $http_authorization;
    ""      $cookie_auth_header;
}

# WebSocket 升级映射
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# =================================================================
# HTTP 服务器：重定向到 HTTPS
# =================================================================
server {
    listen 80;
    server_name _;

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =================================================================
# HTTPS 服务器：SSL 终止 + 反向代理
# =================================================================
server {
    listen 443 ssl;
    server_name _;

    # -----------------------------------------------------------------
    # Cloudflare Origin Certificate
    # -----------------------------------------------------------------
    ssl_certificate /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # -----------------------------------------------------------------
    # 安全头
    # -----------------------------------------------------------------
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    # Docker DNS resolver
    resolver 127.0.0.11 valid=30s;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # 客户端请求大小限制
    client_max_body_size 100M;

    # -----------------------------------------------------------------
    # API 路由: /api/auth/* → backend /auth/*
    # -----------------------------------------------------------------
    location /api/auth/ {
        set $backend_upstream "http://backend:8000";
        rewrite ^/api/auth/(.*) /auth/$1 break;
        proxy_pass $backend_upstream;

        proxy_http_version 1.1;
        proxy_set_header Authorization $final_auth_header;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://$host/ https://$host/;
    }

    # -----------------------------------------------------------------
    # API 路由: /api/users/* → backend /users/*
    # -----------------------------------------------------------------
    location /api/users/ {
        set $backend_upstream "http://backend:8000";
        rewrite ^/api/users/(.*) /users/$1 break;
        proxy_pass $backend_upstream;

        proxy_http_version 1.1;
        proxy_set_header Authorization $final_auth_header;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://$host/ https://$host/;
    }

    # -----------------------------------------------------------------
    # WebSocket 代理: /ws/ → backend（后端 WebSocket 端点在 /ws/tasks）
    # -----------------------------------------------------------------
    location /ws/ {
        set $backend_ws_upstream "http://backend:8000";
        proxy_pass $backend_ws_upstream;

        proxy_http_version 1.1;
        proxy_set_header Authorization $final_auth_header;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    # -----------------------------------------------------------------
    # 通用 API 路由: /api/xxx → backend /api/v1/xxx
    # -----------------------------------------------------------------
    location /api/ {
        set $backend_upstream "http://backend:8000";
        # 确保 rewrite 后的 URL 带尾部斜杠，避免 FastAPI 307 redirect（会丢失 scheme）
        rewrite ^/api/(?!v1/)(.*)$ /api/v1/$1 break;
        proxy_pass $backend_upstream;

        proxy_http_version 1.1;
        proxy_set_header Authorization $final_auth_header;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 拦截后端 3xx 重定向，将 http:// 替换为 https://（防止 Mixed Content）
        proxy_redirect http://$host/ https://$host/;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # -----------------------------------------------------------------
    # MinIO 静态资源代理: /storage/* → minio:9000
    # -----------------------------------------------------------------
    location /storage/ {
        set $minio_upstream "http://minio:9000";
        proxy_pass $minio_upstream/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;

        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # -----------------------------------------------------------------
    # Next.js 静态资源缓存: /_next/static/*
    # -----------------------------------------------------------------
    location /_next/static {
        set $frontend_upstream "http://frontend:3000";
        proxy_pass $frontend_upstream;

        proxy_http_version 1.1;
        proxy_set_header Host $host;

        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # -----------------------------------------------------------------
    # 默认路由: 转发到前端
    # -----------------------------------------------------------------
    location / {
        set $frontend_upstream "http://frontend:3000";
        proxy_pass $frontend_upstream;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # -----------------------------------------------------------------
    # 健康检查
    # -----------------------------------------------------------------
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
