# ===================================================================
# AnyReason AI Studio - Docker Compose（Docker Hub 拉取模式）
# 无需本地构建，直接从 Docker Hub 拉取预构建镜像
# 使用方法：cp .env.example .env && 修改 .env 后执行 scripts/deploy-hub.sh
# ===================================================================

services:
  # -----------------------------------------------------------------
  # 基础设施层 (Infra_Services)
  # -----------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anyreason}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      APP_DB_USER: ${APP_DB_USER:-anyreason_app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-anyreason_app}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init-db/00-create-app-user.sh:/docker-entrypoint-initdb.d/00-create-app-user.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - anyreason-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - anyreason-net

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./data/minio:/data
    networks:
      - anyreason-net

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: "no"
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET_ASSETS: ${MINIO_BUCKET_ASSETS:-anyreason-assets}
      MINIO_BUCKET_EXPORTS: ${MINIO_BUCKET_EXPORTS:-anyreason-exports}
      MINIO_BUCKET_SCRIPTS: ${MINIO_BUCKET_SCRIPTS:-anyreason-scripts}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD; do sleep 2; done
        mc mb --ignore-existing local/$MINIO_BUCKET_ASSETS
        mc mb --ignore-existing local/$MINIO_BUCKET_EXPORTS
        mc mb --ignore-existing local/$MINIO_BUCKET_SCRIPTS
        echo 'minio-init: done'
    networks:
      - anyreason-net

  # -----------------------------------------------------------------
  # 应用层 (App_Services) - 从 Docker Hub 拉取预构建镜像
  # -----------------------------------------------------------------

  db-init:
    image: ${DOCKER_REGISTRY:-knifeandcj/anyreason}:${BACKEND_TAG:-backend-latest}
    restart: "no"
    working_dir: /app
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-anyreason}
      ACCESS_SECRET_KEY: ${ACCESS_SECRET_KEY}
      RESET_PASSWORD_SECRET_KEY: ${RESET_PASSWORD_SECRET_KEY}
      VERIFICATION_SECRET_KEY: ${VERIFICATION_SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SECURE: "false"
      MINIO_BUCKET_SCRIPTS: ${MINIO_BUCKET_SCRIPTS:-anyreason-scripts}
      CREATE_DEFAULT_ADMIN: ${CREATE_DEFAULT_ADMIN:-true}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@example.com}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
    command: ["python", "db_init.py"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - anyreason-net

  backend:
    image: ${DOCKER_REGISTRY:-knifeandcj/anyreason}:${BACKEND_TAG:-backend-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-anyreason}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      AUTO_DB_INIT_ON_STARTUP: "false"
      AUTO_DB_SEED_ON_STARTUP: "false"
      ACCESS_SECRET_KEY: ${ACCESS_SECRET_KEY}
      RESET_PASSWORD_SECRET_KEY: ${RESET_PASSWORD_SECRET_KEY}
      VERIFICATION_SECRET_KEY: ${VERIFICATION_SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SECURE: "false"
      MINIO_BUCKET_ASSETS: ${MINIO_BUCKET_ASSETS:-anyreason-assets}
      MINIO_BUCKET_EXPORTS: ${MINIO_BUCKET_EXPORTS:-anyreason-exports}
      MINIO_BUCKET_SCRIPTS: ${MINIO_BUCKET_SCRIPTS:-anyreason-scripts}
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - anyreason-net

  task-worker:
    image: ${DOCKER_REGISTRY:-knifeandcj/anyreason}:${BACKEND_TAG:-backend-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-anyreason}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      AUTO_DB_INIT_ON_STARTUP: "false"
      AUTO_DB_SEED_ON_STARTUP: "false"
      ACCESS_SECRET_KEY: ${ACCESS_SECRET_KEY}
      RESET_PASSWORD_SECRET_KEY: ${RESET_PASSWORD_SECRET_KEY}
      VERIFICATION_SECRET_KEY: ${VERIFICATION_SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SECURE: "false"
      MINIO_BUCKET_SCRIPTS: ${MINIO_BUCKET_SCRIPTS:-anyreason-scripts}
    command: ["./start_worker.sh"]
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - anyreason-net

  frontend:
    image: ${DOCKER_REGISTRY:-knifeandcj/anyreason}:${FRONTEND_TAG:-frontend-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      INTERNAL_API_BASE_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_started
    networks:
      - anyreason-net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      NGINX_DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot
    depends_on:
      - frontend
      - minio-init
    networks:
      - anyreason-net

# -----------------------------------------------------------------
# 网络
# -----------------------------------------------------------------
networks:
  anyreason-net:
    driver: bridge
