name: Docker Image CI

on:
  push:
    branches: [ "main" ]
    tags: [ '*' ]
    paths:
      - 'fastapi_backend/**'
      - 'nextjs-frontend/**'
      - '.github/workflows/docker-image.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            context: ./fastapi_backend
            dockerfile: ./fastapi_backend/Dockerfile.prod
            image_suffix: backend
          - service: frontend
            context: ./nextjs-frontend
            dockerfile: ./nextjs-frontend/Dockerfile.prod
            image_suffix: frontend

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: knifeandcj/anyreason
        tags: |
          type=ref,event=branch,suffix=-${{ matrix.image_suffix }}
          type=ref,event=tag,suffix=-${{ matrix.image_suffix }}
          type=raw,value=${{ matrix.image_suffix }}-latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.context }}
        file: ${{ matrix.dockerfile }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
